<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hand Control Galaxy</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}
canvas{
display:block;
}
video{
display:none;
}
</style>

</head>

<body>

<video id="video" autoplay playsinline></video>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 5

let renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

let geometry = new THREE.BufferGeometry()

let count = 15000
let positions = new Float32Array(count*3)

for(let i=0;i<count;i++){

let radius = Math.random()*5
let spin = radius*3
let angle = Math.random()*Math.PI*2

positions[i*3] = Math.cos(angle+spin)*radius
positions[i*3+1] = (Math.random()-0.5)
positions[i*3+2] = Math.sin(angle+spin)*radius

}

geometry.setAttribute(
'position',
new THREE.BufferAttribute(positions,3)
)

let material = new THREE.PointsMaterial({
size:0.03,
color:0xff6030
})

let galaxy = new THREE.Points(geometry,material)

scene.add(galaxy)

function animate(){

requestAnimationFrame(animate)

renderer.render(scene,camera)

}

animate()

// ---------- HAND TRACKING ----------

const videoElement = document.getElementById("video")

const hands = new Hands({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
}
})

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
})

hands.onResults(results=>{

if(results.multiHandLandmarks.length>0){

let x = results.multiHandLandmarks[0][9].x
let y = results.multiHandLandmarks[0][9].y

galaxy.rotation.y = x * Math.PI * 2
galaxy.rotation.x = y * Math.PI * 2

}

})

const cam = new Camera(videoElement,{
onFrame:async()=>{
await hands.send({image:videoElement})
},
width:640,
height:480
})

cam.start()

</script>

</body>
</html>
