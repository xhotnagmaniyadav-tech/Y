<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galaxy Animation</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}
</style>

</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
100
)

camera.position.z = 8

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

let count = 60000
let radius = 6
let branches = 4
let spin = 1.8

let geometry = new THREE.BufferGeometry()

let positions = new Float32Array(count*3)
let colors = new Float32Array(count*3)

for(let i=0;i<count;i++){

let r = Math.random()*radius
let branchAngle = (i%branches)/branches*Math.PI*2
let spinAngle = r*spin

positions[i*3] =
Math.cos(branchAngle+spinAngle)*r

positions[i*3+1] =
(Math.random()-0.5)*0.5

positions[i*3+2] =
Math.sin(branchAngle+spinAngle)*r


// gradient color
colors[i*3] = 1
colors[i*3+1] = 0.3 + r/radius
colors[i*3+2] = 0.1

}

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

geometry.setAttribute(
"color",
new THREE.BufferAttribute(colors,3)
)

let material = new THREE.PointsMaterial({

size:0.03,
vertexColors:true,
blending:THREE.AdditiveBlending,
depthWrite:false

})

let galaxy = new THREE.Points(geometry,material)

scene.add(galaxy)

function animate(){

requestAnimationFrame(animate)

galaxy.rotation.y += 0.001

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
